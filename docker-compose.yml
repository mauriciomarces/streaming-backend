version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: streaming-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  catalog-service:
    build: ./catalog-service
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
    environment:
    - MONGO_URI=mongodb://mongodb:27017/ContenidoDB

  interaction-laravel:
    build: ./interaction-laravel
    ports:
      - "8000:8000"
    volumes:
      - ./interaction-laravel:/app
    command: php artisan serve --host=0.0.0.0 --port=8000
    depends_on:
      - mongodb

volumes:
  mongo_data: